<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Admin Dashboard — Holland Recruitment</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--blue:#3551E6;--blue-deep:#2334AE;--blue-soft:#E9ECFF;--lime:#D6F24E;--coral:#FF7A59;--ink:#15183A;--muted:#5C6178;--cream:#FBF6EC;--line:#ECE5D6;--green:#10B981;--green-soft:#DCF5E3;--amber:#F59E0B;--amber-soft:#FFF1D6;--red:#DC2626;--red-soft:#FEE2E2;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--cream);color:var(--ink);font-size:15px;line-height:1.5;}
.wrap{max-width:1280px;margin:0 auto;padding:0 24px;}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;cursor:pointer;}

/* Login screen */
.login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.login-card{background:#fff;border:1.5px solid var(--line);border-radius:24px;padding:36px;max-width:380px;width:100%;box-shadow:0 18px 48px rgba(21,24,58,.13);}
.login-card h1{font-family:'Poppins',sans-serif;font-weight:800;font-size:1.6rem;margin-bottom:8px;}
.login-card p{color:var(--muted);font-size:14px;margin-bottom:24px;}
.login-card input{width:100%;padding:14px 18px;border:1.5px solid var(--line);border-radius:14px;font-size:16px;margin-bottom:14px;}
.login-card input:focus{outline:none;border-color:var(--blue);}
.login-card button{width:100%;background:var(--blue);color:#fff;border:0;padding:14px;border-radius:14px;font-family:'Poppins',sans-serif;font-weight:700;font-size:15px;}
.login-card button:hover{background:var(--blue-deep);}
.login-card .err{color:var(--red);font-size:13px;margin-bottom:12px;display:none;}
.login-card .err.show{display:block;}

/* Dashboard */
.dash{display:none;padding:24px 0 60px;}
.dash.visible{display:block;}
.dash-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:12px;}
.dash-head h1{font-family:'Poppins',sans-serif;font-weight:800;font-size:1.7rem;}
.dash-head .actions{display:flex;gap:10px;align-items:center;}
.dash-head .stamp{color:var(--muted);font-size:13px;}
.btn{background:#fff;border:1.5px solid var(--line);padding:9px 16px;border-radius:99px;font-family:'Poppins',sans-serif;font-weight:600;font-size:13px;color:var(--ink);}
.btn:hover{background:var(--cream);}
.btn-primary{background:var(--blue);border-color:var(--blue);color:#fff;}
.btn-primary:hover{background:var(--blue-deep);}
.btn-danger{background:#fff;border-color:var(--red);color:var(--red);}
.btn-danger:hover{background:var(--red-soft);}
.btn-success{background:var(--green);border-color:var(--green);color:#fff;}
.btn-success:hover{background:#0B8C68;}
.btn-logout{color:var(--red);font-family:'Poppins',sans-serif;font-weight:600;font-size:13px;background:none;border:0;}

/* Tabs */
.tabs{display:flex;gap:8px;margin-bottom:22px;flex-wrap:wrap;}
.tab{background:#fff;border:1.5px solid var(--line);padding:10px 18px;border-radius:99px;font-family:'Poppins',sans-serif;font-weight:600;font-size:13px;color:var(--muted);position:relative;}
.tab.active{background:var(--ink);color:#fff;border-color:var(--ink);}
.tab .count{background:var(--blue-soft);color:var(--blue);padding:2px 8px;border-radius:99px;font-size:11px;margin-left:6px;font-weight:700;}
.tab.active .count{background:rgba(255,255,255,.2);color:#fff;}

/* Stat cards */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:26px;}
.stat{background:#fff;border:1.5px solid var(--line);border-radius:16px;padding:18px;}
.stat .label{font-size:11.5px;color:var(--muted);font-family:'Poppins',sans-serif;font-weight:600;letter-spacing:.04em;text-transform:uppercase;margin-bottom:8px;}
.stat .val{font-family:'Poppins',sans-serif;font-weight:800;font-size:2.1rem;line-height:1;color:var(--ink);}
.stat .sub{font-size:12px;color:var(--muted);margin-top:4px;}
.stat.alert{border-color:var(--red);background:#FEF2F2;}
.stat.alert .val{color:var(--red);}
.stat.warn{border-color:var(--amber);background:#FFFBEB;}
.stat.warn .val{color:var(--amber);}
.stat.ok{border-color:var(--green);background:#F0FDF4;}
.stat.ok .val{color:var(--green);}

/* Toolbar (filter/search) */
.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px;align-items:center;}
.toolbar input,.toolbar select{font-family:inherit;font-size:14px;border:1.5px solid var(--line);border-radius:11px;padding:10px 14px;background:#fff;color:var(--ink);}
.toolbar input{flex:1;min-width:220px;}
.toolbar select{min-width:140px;}

/* Lists */
.list{display:flex;flex-direction:column;gap:11px;}
.card{background:#fff;border:1.5px solid var(--line);border-radius:14px;padding:18px 20px;cursor:pointer;transition:border-color .15s ease,transform .12s ease;}
.card:hover{border-color:var(--blue);}
.card .top{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;flex-wrap:wrap;}
.card .title{font-family:'Poppins',sans-serif;font-weight:700;font-size:1.05rem;}
.card .sub{color:var(--muted);font-size:13px;margin-top:3px;}
.card .right{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.card .meta{display:flex;gap:18px;font-size:12.5px;color:var(--muted);margin-top:8px;flex-wrap:wrap;}
.card .meta b{color:var(--ink);font-weight:600;}
.card .summary{background:var(--cream);border-radius:10px;padding:11px 14px;font-size:13.5px;margin-top:10px;color:#3a3d55;white-space:pre-wrap;}
.card .notitie{background:var(--blue-soft);border:1px solid #D9DEFF;border-radius:10px;padding:10px 13px;font-size:13px;margin-top:10px;color:#2c3055;}
.card .actions-row{display:flex;gap:8px;margin-top:13px;flex-wrap:wrap;align-items:center;}
.card .actions-row button,.card .actions-row a.btn{padding:7px 14px;font-size:12.5px;}

/* Badges */
.badge{font-family:'Poppins',sans-serif;font-weight:700;font-size:11px;padding:4px 10px;border-radius:99px;text-transform:uppercase;letter-spacing:.04em;display:inline-block;}
.b-new{background:var(--blue-soft);color:var(--blue);}
.b-pending{background:var(--amber-soft);color:#9a6b00;}
.b-active{background:var(--green-soft);color:#1f7a3d;}
.b-done{background:#EBE3FF;color:#6b3fc4;}
.b-rejected{background:var(--red-soft);color:var(--red);}
.b-neutral{background:#EEE;color:#777;}

/* Score */
.score{font-family:'Poppins',sans-serif;font-weight:800;width:54px;height:54px;border-radius:13px;display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1;flex-shrink:0;}
.score small{font-size:7.5px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;opacity:.7;margin-top:3px;}
.s-hi{background:var(--green-soft);color:#1f7a3d;}.s-mid{background:var(--amber-soft);color:#9a6b00;}.s-lo{background:var(--red-soft);color:#b03b3b;}.s-none{background:#F0EEE8;color:#9a9a9a;}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(21,24,58,.55);display:none;align-items:flex-start;justify-content:center;padding:24px;z-index:50;overflow-y:auto;}
.modal-bg.show{display:flex;}
.modal{background:#fff;border-radius:18px;max-width:760px;width:100%;padding:0;margin:30px 0;box-shadow:0 24px 60px rgba(0,0,0,.25);}
.modal .mhead{padding:22px 28px 16px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:flex-start;gap:14px;}
.modal .mhead h3{font-family:'Poppins',sans-serif;font-weight:800;font-size:1.3rem;}
.modal .mhead .msub{color:var(--muted);font-size:13.5px;margin-top:4px;}
.modal .mclose{background:none;border:0;font-size:28px;color:var(--muted);line-height:1;padding:0 4px;}
.modal .mbody{padding:22px 28px;}
.modal .mbody h4{font-family:'Poppins',sans-serif;font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:.07em;color:var(--blue);margin:18px 0 10px;}
.modal .mbody h4:first-child{margin-top:0;}
.modal .mbody dl{display:grid;grid-template-columns:140px 1fr;gap:8px 16px;font-size:14px;}
.modal .mbody dt{color:var(--muted);font-weight:500;}
.modal .mbody dd{font-weight:500;}
.modal .mbody dd a{color:var(--blue);font-weight:600;}
.modal .mfoot{padding:16px 28px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px;flex-wrap:wrap;}
.modal textarea{width:100%;border:1.5px solid var(--line);border-radius:11px;padding:12px 14px;font-family:inherit;font-size:14px;color:var(--ink);resize:vertical;min-height:120px;margin-top:6px;}

/* Chat transcript */
.chat-msgs{max-height:420px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding:14px;background:var(--cream);border-radius:13px;}
.chat-msg{padding:10px 14px;border-radius:12px;max-width:85%;font-size:14px;}
.chat-msg.user{background:#fff;border:1px solid var(--line);align-self:flex-start;}
.chat-msg.assistant{background:var(--blue);color:#fff;align-self:flex-end;}
.chat-msg.system{background:#FEF3C7;align-self:center;font-style:italic;font-size:12.5px;color:#92400E;}
.chat-msg.tool{background:#F3F4F6;border:1px dashed #ccc;align-self:center;font-size:12px;font-family:monospace;color:#444;}
.chat-msg-time{font-size:10.5px;opacity:.6;margin-top:4px;}

/* Loader / messages */
.loader{display:flex;justify-content:center;padding:40px;}
.loader::before{content:"";width:36px;height:36px;border:3px solid var(--line);border-top-color:var(--blue);border-radius:50%;animation:sp .8s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}
.empty{padding:50px 24px;text-align:center;color:var(--muted);background:#fff;border:1.5px dashed var(--line);border-radius:14px;}
.err{background:#FEF2F2;color:var(--red);padding:14px 18px;border-radius:11px;font-size:14px;margin-bottom:14px;}

/* Tab views */
.view{display:none;}
.view.active{display:block;}

/* Hub mobile */
@media (max-width:760px){
  .stat{padding:14px;}
  .stat .val{font-size:1.5rem;}
  .modal{margin:0;border-radius:0;min-height:100vh;}
  .modal .mbody dl{grid-template-columns:1fr;}
  .modal .mbody dt{margin-top:4px;}
}
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div id="login" class="login">
  <div class="login-card">
    <h1>Admin Dashboard</h1>
    <p>Holland Recruitment — interne tooling. Voer je toegangscode in.</p>
    <div id="login-err" class="err">Onjuiste code. Probeer opnieuw.</div>
    <form id="login-form">
      <input type="password" id="login-pin" placeholder="Toegangscode" autocomplete="off" required>
      <button type="submit">Inloggen</button>
    </form>
  </div>
</div>

<!-- ============ DASHBOARD ============ -->
<div id="dash" class="dash">
  <div class="wrap">
    <div class="dash-head">
      <div>
        <h1>Admin Dashboard</h1>
        <div class="stamp" id="stamp"></div>
      </div>
      <div class="actions">
        <button class="btn" onclick="refreshActive()">↻ Vernieuwen</button>
        <button class="btn-logout" onclick="logout()">Uitloggen</button>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" data-tab="overzicht" onclick="switchTab('overzicht')">Overzicht</button>
      <button class="tab" data-tab="vacatures" onclick="switchTab('vacatures')">Vacatures <span class="count" id="c-vac">·</span></button>
      <button class="tab" data-tab="kandidaten" onclick="switchTab('kandidaten')">Kandidaten <span class="count" id="c-cand">·</span></button>
      <button class="tab" data-tab="chats" onclick="switchTab('chats')">B2B Chats <span class="count" id="c-chat">·</span></button>
      <button class="tab" data-tab="matches" onclick="switchTab('matches')">Matches <span class="count" id="c-mat">·</span></button>
      <button class="tab" data-tab="werkgevers" onclick="switchTab('werkgevers')">Werkgevers <span class="count" id="c-co">·</span></button>
      <button class="tab" data-tab="alerts" onclick="switchTab('alerts')">Alerts <span class="count" id="c-alert">·</span></button>
    </div>

    <!-- View: Overzicht -->
    <div id="view-overzicht" class="view active">
      <div class="stats" id="snapshot-stats"></div>
      <h2 style="font-family:'Poppins',sans-serif;font-weight:700;font-size:1.1rem;margin:8px 0 14px;">Recente activiteit</h2>
      <div id="snapshot-recent"></div>
    </div>

    <!-- View: Vacatures -->
    <div id="view-vacatures" class="view">
      <div class="toolbar">
        <input type="search" id="f-vac-search" placeholder="Zoek op titel, stad, bedrijf…" oninput="renderVacatures()">
        <select id="f-vac-status" onchange="renderVacatures()">
          <option value="">Alle statussen</option>
          <option value="open">Open</option>
          <option value="active">Actief</option>
          <option value="filled">Gevuld</option>
          <option value="closed">Gesloten</option>
        </select>
      </div>
      <div id="list-vacatures" class="list"></div>
    </div>

    <!-- View: Kandidaten -->
    <div id="view-kandidaten" class="view">
      <div class="toolbar">
        <input type="search" id="f-cand-search" placeholder="Zoek op naam, stad…" oninput="renderKandidaten()">
        <select id="f-cand-status" onchange="renderKandidaten()">
          <option value="">Alle statussen</option>
          <option value="new">Nieuw</option>
          <option value="screening">Gescreend</option>
          <option value="available">Beschikbaar</option>
          <option value="placed">Geplaatst</option>
          <option value="inactive">Inactief</option>
        </select>
        <select id="f-cand-cv" onchange="renderKandidaten()">
          <option value="">Alle (cv + zonder cv)</option>
          <option value="yes">Met CV</option>
          <option value="no">Zonder CV</option>
        </select>
        <select id="f-cand-sort" onchange="renderKandidaten()">
          <option value="new">Nieuwste eerst</option>
          <option value="score">Hoogste score</option>
        </select>
      </div>
      <div id="list-kandidaten" class="list"></div>
    </div>

    <!-- View: Chats -->
    <div id="view-chats" class="view">
      <div class="toolbar">
        <input type="search" id="f-chat-search" placeholder="Zoek op bedrijf, contact…" oninput="renderChats()">
        <select id="f-chat-status" onchange="renderChats()">
          <option value="">Alle statussen</option>
          <option value="in_progress">In gesprek</option>
          <option value="completed">Voltooid</option>
          <option value="abandoned">Verlaten</option>
        </select>
      </div>
      <div id="list-chats" class="list"></div>
    </div>

    <!-- View: Matches -->
    <div id="view-matches" class="view">
      <div class="toolbar">
        <input type="search" id="f-mat-search" placeholder="Zoek op kandidaat of vacature…" oninput="renderMatches()">
        <select id="f-mat-status" onchange="renderMatches()">
          <option value="">Alle statussen</option>
          <option value="suggested">Voorgesteld (AI)</option>
          <option value="in_review">In review</option>
          <option value="approved">Goedgekeurd</option>
          <option value="rejected">Afgewezen</option>
          <option value="converted">Geplaatst</option>
        </select>
      </div>
      <div id="list-matches" class="list"></div>
    </div>

    <!-- View: Werkgevers -->
    <div id="view-werkgevers" class="view">
      <div class="toolbar">
        <input type="search" id="f-co-search" placeholder="Zoek op bedrijf, sector…" oninput="renderWerkgevers()">
      </div>
      <div id="list-werkgevers" class="list"></div>
    </div>

    <!-- View: Alerts -->
    <div id="view-alerts" class="view">
      <h2 style="font-family:'Poppins',sans-serif;font-weight:700;font-size:1rem;margin:4px 0 12px;color:var(--red);">🛑 Margin alerts</h2>
      <div id="list-margin" class="list"></div>
      <h2 style="font-family:'Poppins',sans-serif;font-weight:700;font-size:1rem;margin:24px 0 12px;color:var(--amber);">⚠️ Monitor findings</h2>
      <div id="list-monitor" class="list"></div>
      <h2 style="font-family:'Poppins',sans-serif;font-weight:700;font-size:1rem;margin:24px 0 12px;color:var(--blue);">📋 AVG verzoeken</h2>
      <div id="list-avg" class="list"></div>
    </div>

  </div>
</div>

<!-- ============ DETAIL MODAL ============ -->
<div id="modal" class="modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="mhead">
      <div>
        <h3 id="modal-title">—</h3>
        <div class="msub" id="modal-sub"></div>
      </div>
      <button class="mclose" onclick="closeModal()">×</button>
    </div>
    <div class="mbody" id="modal-body"></div>
    <div class="mfoot" id="modal-foot"></div>
  </div>
</div>

<!-- ============ NOTITIE MODAL (oude feature behouden) ============ -->
<div id="notitie-modal" class="modal-bg" onclick="if(event.target===this)closeNotitie()">
  <div class="modal" style="max-width:540px;">
    <div class="mhead">
      <div>
        <h3>Toelichting van de recruiter</h3>
        <div class="msub">Voor <b id="notitie-naam">—</b>. Deze tekst verschijnt op de presentatie-cv.</div>
      </div>
      <button class="mclose" onclick="closeNotitie()">×</button>
    </div>
    <div class="mbody">
      <textarea id="notitie-text" placeholder="Bijv. Betrouwbare, gemotiveerde indruk tijdens het gesprek. Heeft eigen vervoer en kan per direct starten."></textarea>
    </div>
    <div class="mfoot">
      <button class="btn" onclick="closeNotitie()">Annuleren</button>
      <button class="btn btn-primary" id="notitie-save" onclick="saveNotitie()">Opslaan</button>
    </div>
  </div>
</div>

<script>
/* ============ CONFIG ============ */
var API_URL = 'https://hollandrecruitment.app.n8n.cloud/webhook/admin-data';
var BESTAND_URL = 'https://hollandrecruitment.app.n8n.cloud/webhook/recruiter-bestand';
var NOTITIE_URL = 'https://hollandrecruitment.app.n8n.cloud/webhook/kandidaat-notitie';
var INTAKE_URL = 'https://hollandrecruitment.app.n8n.cloud/webhook/intake-uitnodigen';
var VOORSTEL_URL = 'https://hollandrecruitment.app.n8n.cloud/webhook/werkgever-voorstel';
var PIN_KEY = 'hr_admin_pin_2026';

var pin = sessionStorage.getItem(PIN_KEY) || '';
var state = {
  snapshot: null,
  vacatures: [],
  kandidaten: [],
  chats: [],
  matches: [],
  werkgevers: [],
  alerts: { margin_alerts: [], monitor_findings: [], avg_requests: [] },
  loaded: { overzicht:false, vacatures:false, kandidaten:false, chats:false, matches:false, werkgevers:false, alerts:false },
  activeTab: 'overzicht',
  notitieId: null
};

/* ============ AUTH ============ */
document.getElementById('login-form').addEventListener('submit', function(e){
  e.preventDefault();
  var p = document.getElementById('login-pin').value.trim();
  if(!p){ showLoginErr(); return; }
  // CRITICAL: zet pin VOOR de api call (race condition fix)
  pin = p;
  document.getElementById('login-err').classList.remove('show');
  api('snapshot').then(function(d){
    if(d && !d.error && (d.snapshot || d.generated_at)){
      sessionStorage.setItem(PIN_KEY, pin);
      showDash(); loadTab('overzicht');
    } else {
      pin = '';
      showLoginErr();
    }
  }).catch(function(){
    pin = '';
    showLoginErr();
  });
});

function showLoginErr(){ document.getElementById('login-err').classList.add('show'); pin=''; sessionStorage.removeItem(PIN_KEY); }
function showDash(){
  document.getElementById('login').style.display='none';
  document.getElementById('dash').classList.add('visible');
}
function logout(){ sessionStorage.removeItem(PIN_KEY); location.reload(); }

if(pin){
  // Auto-attempt with stored PIN
  api('snapshot').then(function(d){
    if(d && !d.error && (d.snapshot || d.generated_at)){ showDash(); loadTab('overzicht'); }
    else { logout(); }
  }).catch(function(){ logout(); });
}

/* ============ API ============ */
function api(action, params){
  return fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type':'application/json', 'X-Admin-Pin': pin },
    body: JSON.stringify({ action: action, params: params || {} })
  }).then(function(r){ return r.ok ? r.json() : r.json().then(function(d){ d._http=r.status; return d; }); });
}

/* ============ HELPERS ============ */
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(s){ if(!s) return '—'; var d=new Date(s); if(isNaN(d)) return '—'; return d.toLocaleDateString('nl-NL',{day:'numeric',month:'short',year:'numeric'}); }
function fmtDateTime(s){ if(!s) return '—'; var d=new Date(s); if(isNaN(d)) return '—'; return d.toLocaleString('nl-NL',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}); }
function fmtEur(n){ if(n==null) return '€—'; return '€'+Number(n).toLocaleString('nl-NL',{minimumFractionDigits:0,maximumFractionDigits:2}); }
function scoreClass(s){ if(s==null) return 's-none'; return s>=70?'s-hi':(s>=45?'s-mid':'s-lo'); }
function badgeClass(s){
  var map = {
    'new':'b-new','open':'b-new','suggested':'b-new','received':'b-new','in_progress':'b-new',
    'screening':'b-pending','pending':'b-pending','in_review':'b-pending','warning':'b-pending',
    'active':'b-active','available':'b-active','completed':'b-active','approved':'b-active','filled':'b-active',
    'placed':'b-done','converted':'b-done','done':'b-done',
    'rejected':'b-rejected','closed':'b-rejected','expired':'b-rejected','critical':'b-rejected','abandoned':'b-rejected'
  };
  return map[s] || 'b-neutral';
}
function badgeLabel(s){
  var map={
    'new':'Nieuw','open':'Open','suggested':'AI voorstel','received':'Ontvangen','in_progress':'In gesprek',
    'screening':'Gescreend','pending':'In behandeling','in_review':'In review','warning':'Warning',
    'active':'Actief','available':'Beschikbaar','completed':'Voltooid','approved':'Goedgekeurd','filled':'Gevuld',
    'placed':'Geplaatst','converted':'Geplaatst','done':'Afgehandeld',
    'rejected':'Afgewezen','closed':'Gesloten','expired':'Verlopen','critical':'Kritiek','abandoned':'Verlaten'
  };
  return map[s] || (s||'—');
}

/* ============ TABS ============ */
function switchTab(t){
  state.activeTab = t;
  document.querySelectorAll('.tab').forEach(function(b){ b.classList.toggle('active', b.dataset.tab===t); });
  document.querySelectorAll('.view').forEach(function(v){ v.classList.remove('active'); });
  document.getElementById('view-'+t).classList.add('active');
  if(!state.loaded[t]) loadTab(t);
}
function refreshActive(){ state.loaded[state.activeTab]=false; loadTab(state.activeTab); }
function loadTab(t){
  var box = document.getElementById('view-'+t);
  if(t==='overzicht'){
    box.querySelector('#snapshot-stats').innerHTML = '<div class="loader"></div>';
    api('snapshot').then(function(d){ state.snapshot=d; state.loaded.overzicht=true; renderSnapshot(); });
  } else if(t==='vacatures'){
    document.getElementById('list-vacatures').innerHTML = '<div class="loader"></div>';
    api('list-vacancies').then(function(d){ state.vacatures=extractItems(d); state.loaded.vacatures=true; updateCounts(); renderVacatures(); });
  } else if(t==='kandidaten'){
    document.getElementById('list-kandidaten').innerHTML = '<div class="loader"></div>';
    api('list-candidates').then(function(d){ state.kandidaten=extractItems(d); state.loaded.kandidaten=true; updateCounts(); renderKandidaten(); });
  } else if(t==='chats'){
    document.getElementById('list-chats').innerHTML = '<div class="loader"></div>';
    api('list-chats').then(function(d){ state.chats=extractItems(d); state.loaded.chats=true; updateCounts(); renderChats(); });
  } else if(t==='matches'){
    document.getElementById('list-matches').innerHTML = '<div class="loader"></div>';
    api('list-matches').then(function(d){ state.matches=extractItems(d); state.loaded.matches=true; updateCounts(); renderMatches(); });
  } else if(t==='werkgevers'){
    document.getElementById('list-werkgevers').innerHTML = '<div class="loader"></div>';
    api('list-companies').then(function(d){ state.werkgevers=extractItems(d); state.loaded.werkgevers=true; updateCounts(); renderWerkgevers(); });
  } else if(t==='alerts'){
    document.getElementById('list-margin').innerHTML = '<div class="loader"></div>';
    api('list-alerts').then(function(d){
      state.alerts = d || { margin_alerts:[],monitor_findings:[],avg_requests:[] };
      state.loaded.alerts=true; updateCounts(); renderAlerts();
    });
  }
}

// Helper: pak items uit response (RPCs returnen {items: [...]} sinds v3 om n8n array-split te omzeilen)
function extractItems(d){
  if(!d) return [];
  if(Array.isArray(d)) return d;
  if(d.items && Array.isArray(d.items)) return d.items;
  // Fallback: single object (n8n splitste array) — wrap in 1-element array
  if(d.id) return [d];
  return [];
}

function updateCounts(){
  document.getElementById('c-vac').textContent = state.vacatures.length || '·';
  document.getElementById('c-cand').textContent = state.kandidaten.length || '·';
  document.getElementById('c-chat').textContent = state.chats.length || '·';
  document.getElementById('c-mat').textContent = state.matches.length || '·';
  document.getElementById('c-co').textContent = state.werkgevers.length || '·';
  var aTotal = (state.alerts.margin_alerts||[]).length + (state.alerts.monitor_findings||[]).length + (state.alerts.avg_requests||[]).length;
  document.getElementById('c-alert').textContent = aTotal || '·';
}

  }

  var critAlerts = (s.open_critical_alerts||0) + (s.monitor_critical||0);
  var warnAlerts = (s.open_warning_alerts||0) + (s.monitor_warning||0);
  var cards = [
    { label:'Open vacatures', val:s.open_vacancies||0, sub:'+'+(s.new_vacancies_7d||0)+' afgelopen 7d', cls:'' },
    { label:'Actieve klanten', val:s.active_companies||0, sub:'+'+(s.new_companies_7d||0)+' afgelopen 7d', cls:'' },
    { label:'Kandidaten met consent', val:s.candidates_with_consent||0, sub:'+'+(s.new_candidates_7d||0)+' afgelopen 7d', cls:'' },
    { label:'B2B chats', val:s.chats_completed||0, sub:(s.chats_in_progress||0)+' lopend · +'+(s.new_chats_7d||0)+' nieuw 7d', cls:'' },
    { label:'Wachtende matches', val:s.pending_matches||0, sub:'AI voorstellen om te reviewen', cls:s.pending_matches>0?'warn':'' },
    { label:'Actieve plaatsingen', val:s.active_placements||0, sub:'Marge: '+fmtEur(s.total_margin_eur), cls:s.active_placements>0?'ok':'' },
    { label:'Margin alerts', val:(s.open_critical_alerts||0)+(s.open_warning_alerts||0), sub:(s.open_critical_alerts||0)+' kritiek · '+(s.open_warning_alerts||0)+' warning', cls:s.open_critical_alerts>0?'alert':(s.open_warning_alerts>0?'warn':'') },
    { label:'AVG verzoeken', val:s.open_avg_requests||0, sub:(s.avg_due_soon||0)+' verlopen binnen 7d', cls:s.avg_due_soon>0?'alert':'' },
    { label:'Monitor findings', val:(s.monitor_critical||0)+(s.monitor_warning||0), sub:(s.monitor_critical||0)+' kritiek · '+(s.monitor_warning||0)+' warning', cls:s.monitor_critical>0?'alert':(s.monitor_warning>0?'warn':'') }
  ];
  document.getElementById('snapshot-stats').innerHTML = cards.map(function(c){
    return '<div class="stat '+c.cls+'"><div class="label">'+esc(c.label)+'</div><div class="val">'+c.val+'</div><div class="sub">'+esc(c.sub)+'</div></div>';
  }).join('');

  // Recent activity — pak van snapshot RPC: recent_vacancies, recent_candidates, pending_matches
  var rec = '';
  if(d.recent_vacancies && d.recent_vacancies.length){
    rec += '<h4 style="font-family:Poppins,sans-serif;font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:.07em;color:var(--blue);margin:14px 0 10px;">Recente vacatures</h4>';
    rec += '<div class="list">'+d.recent_vacancies.map(function(v){
      return '<div class="card" onclick="openDetail(\'vacancy\',\''+esc(v.id)+'\')">'
        +'<div class="top"><div><div class="title">'+(v.headcount_needed?v.headcount_needed+'× ':'')+esc(v.title||'—')+'</div>'
        +'<div class="sub">'+esc(v.company_name||'Onbekend')+' · '+esc(v.city||'NL')+' · '+esc(v.sector||'')+' · '+fmtDateTime(v.created_at)+'</div></div>'
        +'<div class="right"><span class="badge '+badgeClass(v.status)+'">'+badgeLabel(v.status)+'</span></div></div></div>';
    }).join('')+'</div>';
  }
  if(d.pending_matches && d.pending_matches.length){
    rec += '<h4 style="font-family:Poppins,sans-serif;font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:.07em;color:var(--blue);margin:18px 0 10px;">Wachtende AI-matches</h4>';
    rec += '<div class="list">'+d.pending_matches.map(function(m){
      return '<div class="card" onclick="openDetail(\'match\',\''+esc(m.id)+'\')">'
        +'<div class="top"><div class="score '+scoreClass(m.fit_score)+'">'+(m.fit_score||'–')+'<small>fit</small></div>'
        +'<div style="flex:1;"><div class="title">'+esc(m.candidate_name||'—')+' → '+esc(m.vacancy_title||'—')+'</div>'
        +'<div class="sub">'+esc(m.company_name||'')+' · '+esc(m.vacancy_city||'')+'</div></div></div>'
        +(m.reasoning?'<div class="summary">'+esc(m.reasoning)+'</div>':'')
        +'<div class="actions-row">'
        +'<button class="btn btn-success" onclick="event.stopPropagation();matchAction(\''+esc(m.id)+'\',\'approve\',this)">✓ Goedkeuren</button>'
        +'<button class="btn btn-danger" onclick="event.stopPropagation();matchAction(\''+esc(m.id)+'\',\'reject\',this)">✗ Afwijzen</button>'
        +'</div></div>';
    }).join('')+'</div>';

function renderKandidaten(){

  if(st) lst = lst.filter(function(c){return c.status===st;});
  if(cv==='yes') lst = lst.filter(function(c){return c.has_cv;});
  if(cv==='no') lst = lst.filter(function(c){return !c.has_cv;});

/* ============ DETAIL MODAL ============ */
function openDetail(type,id){
  var modal = document.getElementById('modal');
  document.getElementById('modal-title').textContent = 'Laden…';
  document.getElementById('modal-sub').textContent = '';
  document.getElementById('modal-body').innerHTML = '<div class="loader"></div>';
  document.getElementById('modal-foot').innerHTML = '';
  modal.classList.add('show');
  api('detail-'+type, { id: id }).then(function(d){
    if(!d || d.error){
      var errMsg = '<b>Fout:</b> ' + (d && d.error ? esc(d.error) : 'onbekend');
      if(d && d.sqlerrm) errMsg += '<br><b>SQL:</b> '+esc(d.sqlerrm);
      if(d && d.sqlstate) errMsg += '<br><b>State:</b> '+esc(d.sqlstate);
      if(d && d.context) errMsg += '<br><b>Context:</b> '+esc(d.context);
      document.getElementById('modal-body').innerHTML = '<div class="err">'+errMsg+'</div>';
      document.getElementById('modal-foot').innerHTML = '<button class="btn" onclick="closeModal()">Sluiten</button>';
      return;
    }
    if(type==='vacancy') renderVacancyDetail(d);
    else if(type==='candidate') renderCandidateDetail(d);
    else if(type==='chat') renderChatDetail(d);
    else if(type==='company') renderCompanyDetail(d);
    else if(type==='match'){
      var match = state.matches.find(function(m){return m.id===id;});
      if(match && match.vacancy_id){
        api('detail-vacancy', { id: match.vacancy_id }).then(function(vd){
          if(vd && !vd.error) renderVacancyDetail(vd);
          else document.getElementById('modal-body').innerHTML = '<div class="err">Vacature niet gevonden.</div>';
        });
      } else {
        document.getElementById('modal-body').innerHTML = '<div class="err">Match niet gevonden.</div>';
      }
    }
  }).catch(function(err){
    document.getElementById('modal-body').innerHTML = '<div class="err">Netwerk fout: '+esc(err && err.message || '')+'</div>';
    document.getElementById('modal-foot').innerHTML = '<button class="btn" onclick="closeModal()">Sluiten</button>';
  });
}
function closeModal(){ document.getElementById('modal').classList.remove('show'); }

/* ============ ACTIONS ============ */
function matchAction(matchId, act, btn){
  if(btn){ btn.disabled=true; btn.textContent='Bezig…'; }
  api('match-action', { match_id: matchId, match_action: act }).then(function(d){
    if(d && d.ok){
      if(btn){ btn.textContent = act==='approve'?'✓ Goedgekeurd':'✗ Afgewezen'; btn.disabled=true; }
      // Refresh data
      state.loaded.matches = false; state.loaded.overzicht = false;
      if(state.activeTab==='matches' || state.activeTab==='overzicht') loadTab(state.activeTab);
    } else {
      if(btn){ btn.disabled=false; btn.textContent=act==='approve'?'✓ Goedkeuren':'✗ Afwijzen'; }
      alert('Actie mislukt: ' + (d && d.error || 'onbekende fout'));
    }
  });
}

function openBestand(path){
  if(!path) return;
  var w = window.open('', '_blank');
  fetch(BESTAND_URL, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ path: path }) })
    .then(function(r){ return r.json(); })
    .then(function(d){
      if(d && d.url){ if(w) w.location = d.url; else window.location = d.url; }
      else { if(w) w.close(); alert('Kon bestand niet openen.'); }
    })
    .catch(function(){ if(w) w.close(); alert('Kon bestand niet openen.'); });
}

function openNotitie(candidateId){
  var c = state.kandidaten.find(function(x){return x.id===candidateId;});
  state.notitieId = candidateId;
  document.getElementById('notitie-naam').textContent = c ? (c.first_name+' '+(c.last_name||'')).trim() : 'kandidaat';
  document.getElementById('notitie-text').value = c && c.recruiter_notitie ? c.recruiter_notitie : '';
  document.getElementById('notitie-modal').classList.add('show');
}
function closeNotitie(){ document.getElementById('notitie-modal').classList.remove('show'); state.notitieId=null; }
function saveNotitie(){
  if(!state.notitieId) return;
  var tekst = document.getElementById('notitie-text').value;
  var btn = document.getElementById('notitie-save');
  btn.disabled = true; btn.textContent = 'Opslaan…';
  fetch(NOTITIE_URL, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ candidate_id: state.notitieId, notitie: tekst }) })
    .then(function(r){
      var c = state.kandidaten.find(function(x){return x.id===state.notitieId;});
      if(c) c.recruiter_notitie = tekst;
      btn.disabled = false; btn.textContent = 'Opslaan';
      closeNotitie(); renderKandidaten();
    })
    .catch(function(){
      btn.disabled = false; btn.textContent = 'Opslaan';
      alert('Opslaan mislukt. Workflow "HR — Kandidaat-notitie" actief?');
    });
}

function nodigUit(candidateId, btn){
  if(btn){ btn.disabled=true; btn.textContent='Bezig…'; }
  fetch(INTAKE_URL, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ candidate_id: candidateId }) })
    .then(function(){
      var c = state.kandidaten.find(function(x){return x.id===candidateId;});
      if(c) c.intake_uitgenodigd_at = new Date().toISOString();
      if(btn){ btn.textContent='✓ Uitgenodigd'; btn.disabled=true; }
    })
    .catch(function(){
      if(btn){ btn.disabled=false; btn.textContent='📨 Uitnodigen'; }
      alert('Uitnodiging mislukt. Workflow "HR — Intake-uitnodigen" actief?');
    });
}

function voorstellen(vacancyId, candidateId, btn){
  if(btn){ btn.disabled=true; btn.textContent='Bezig…'; }
  // Map to old leads payload: lead_id is now vacancy_id; backwards compatibility
  fetch(VOORSTEL_URL, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ lead_id: vacancyId, vacancy_id: vacancyId, candidate_id: candidateId }) })
    .then(function(){ if(btn){ btn.textContent='✓ Voorgesteld'; btn.disabled=true; } })
    .catch(function(){
      if(btn){ btn.disabled=false; btn.textContent='→ Voorstellen aan werkgever'; }
      alert('Voorstel mislukt. Workflow "HR — Werkgever-voorstel" actief?');
    });
}
